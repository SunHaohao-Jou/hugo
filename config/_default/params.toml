mainSections   = ["post"]
rssFullContent = true

[sidebar]
    compact  = false
    emoji    = "📝"
    subtitle = "欢迎来到我的博客"
    avatar   = "img/preview_1.JPG"

[footer]
    since = 2026

[article]
    toc         = true
    readingTime = true

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

[colorScheme]
    toggle  = true
    default = "auto"
